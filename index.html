<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blindfold Chess Trainer</title>
    <link rel="icon" href="img/favicon.png" />

    <script
      data-goatcounter="https://blindfoldchesstrainer.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script src="js/chess.js"></script>
    <link rel="stylesheet" href="css/chessboard-1.0.0.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/chessboard-1.0.0.min.js"></script>
  </head>
  <body>
    <button
      class="settings-toggle"
      type="button"
      data-bs-toggle="offcanvas"
      data-bs-target="#settingsPanel"
      aria-label="Open settings"
    >
      <i class="fas fa-cog"></i>
    </button>

    <main class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="board-unit">
        <div class="board-row">
          <div class="eval-col" id="eval-col">
            <div class="eval-bar">
              <div class="eval-bar-fill" id="eval-bar-fill"></div>
            </div>
          </div>
          <div class="board-col">
            <div id="board-wrapper">
              <div id="chess_board"></div>
            </div>
            <div id="pgn-only-wrapper" class="d-none">
              <div id="pgn-only-content"></div>
            </div>
          </div>
        </div>
        <div class="board-footer">
          <span class="eval-value" id="eval-value">0.00</span>
          <input
            type="text"
            class="form-control form-control-sm"
            id="user-move"
            placeholder="Type a move (e.g., e4, O-O, Bxg4)"
            autocapitalize="off"
          />
          <button
            id="voice_move_main"
            class="btn btn-outline-secondary btn-sm voice-btn-main"
            title="Voice Move"
          >
            <i class="fas fa-microphone"></i>
          </button>
        </div>
        <div class="loading-container">
          <span class="loading">Thinking...</span>
        </div>
      </div>
    </main>

    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="settingsPanel"
      aria-labelledby="settingsLabel"
      data-bs-scroll="true"
      data-bs-backdrop="false"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="settingsLabel">Settings</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-4">
        <div>
          <h6 class="settings-section-label">Game</h6>
          <div class="d-grid gap-2">
            <button id="new_game" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-plus me-2"></i>New Game
            </button>
            <button id="take_back" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-undo me-2"></i>Take Back
            </button>
            <button id="flip_board" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-arrows-rotate me-2"></i>Flip Board
            </button>
            <button id="choose_color" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-chess-pawn me-2"></i
              ><span id="color-label">Play as Black</span>
            </button>
            <button id="voice_move" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-microphone me-2"></i>Voice Move
            </button>
          </div>
        </div>

        <div>
          <h6 class="settings-section-label">Display</h6>
          <div class="form-check form-switch mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="toggle-eval"
              checked
            />
            <label class="form-check-label" for="toggle-eval"
              >Evaluation bar</label
            >
          </div>
          <div class="form-check form-switch mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="toggle-pieces"
            />
            <label class="form-check-label" for="toggle-pieces"
              >Hide pieces</label
            >
          </div>
          <div class="form-check form-switch mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="toggle-pgn-only"
            />
            <label class="form-check-label" for="toggle-pgn-only"
              >PGN only (no board)</label
            >
          </div>
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="toggle-voice-btn"
              checked
            />
            <label class="form-check-label" for="toggle-voice-btn"
              >Voice button on board</label
            >
          </div>
        </div>

        <div>
          <h6 class="settings-section-label">Difficulty</h6>
          <label for="difficulty" class="form-label mb-1">
            Skill Level: <strong id="difficulty-value">1</strong>
            <span class="text-body-secondary small">(~800 – 3000 ELO)</span>
          </label>
          <input
            type="range"
            class="form-range"
            id="difficulty"
            min="1"
            max="20"
            value="1"
          />
        </div>

        <div>
          <h6 class="settings-section-label">PGN</h6>
          <div class="pgn-box" id="pgn-box">
            <div id="pgn"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/boardLogic.js"></script>
    <script src="js/optionButtons.js"></script>
    <script src="js/auditoryMoves.js"></script>
  </body>
</html>
